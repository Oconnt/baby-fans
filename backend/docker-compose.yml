version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: baby-fans-db
    environment:
      MYSQL_ROOT_PASSWORD: baby_fans_password
      MYSQL_DATABASE: baby_fans
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbaby_fans_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baby-fans
    ports:
      - "18081:18081"
    volumes:
      - ./storage:/app/storage
      - ./certs:/app/certs:ro
    environment:
      - SERVER_PORT=18081
      - SERVER_MODE=release
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "-s", "-o", "/dev/null", "-w", "%{http_code}", "https://localhost:18081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
