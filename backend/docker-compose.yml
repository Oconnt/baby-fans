version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baby-fans
    ports:
      - "18081:18081"
    volumes:
      - ./storage:/app/storage
      - ./etc:/app/config
      - ./baby-fans.db:/app/baby-fans.db
    environment:
      - SERVER_PORT=18081
      - SERVER_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
